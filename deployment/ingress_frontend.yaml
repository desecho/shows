---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shows-frontend
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - shows.samarchyan.me
      secretName: shows-frontend-tls
  rules:
    - host: shows.samarchyan.me
      http:
        paths:
          - pathType: Prefix
            path: "/"
            backend:
              service:
                name: shows-frontend
                port:
                  number: 80
